<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육혁신처 온라인콘텐츠 네트워크 시각화</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #1e1e1e; /* 옵시디언 다크모드 느낌의 배경색 */
        }

        header {
            background-color: #2d2d2d; 
            color: #e0e0e0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .container {
            display: flex;
            flex: 1; 
            overflow: hidden;
        }

        #mindmap-area {
            flex: 7;
            background-color: #1e1e1e; /* 그래프 영역 다크 배경 */
            border-right: 1px solid #444;
            position: relative;
        }

        #detail-area {
            flex: 3;
            padding: 20px;
            background-color: #252525; /* 우측 패널 다크 배경 */
            color: #e0e0e0;
            overflow-y: auto; 
        }

        .info-box {
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            background-color: #2d2d2d;
            min-height: 200px;
        }

        .info-box h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #a371f7; /* 옵시디언 스타일의 포인트 컬러 (보라색) */
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        table th, table td {
            border: 1px solid #555;
            padding: 10px 8px;
            text-align: left;
        }

        table th {
            background-color: #383838;
            width: 35%;
            color: #e0e0e0;
        }
        
        table tr:hover {
            background-color: #3d3d3d;
        }
        
        .placeholder-text {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>온라인콘텐츠 네트워크(지식 그래프) 뷰</h1>
        <div>
            <label for="csvFileInput" style="margin-right: 10px; font-weight: bold; color: #a371f7;">CSV 데이터 업로드:</label>
            <input type="file" id="csvFileInput" accept=".csv" style="color: #fff;" />
        </div>
    </header>

    <div class="container">
        <div id="mindmap-area"></div>
        <div id="detail-area">
            <div class="info-box" id="infoBox">
                <h2>콘텐츠 상세 정보</h2>
                <div id="table-container">
                    <p class="placeholder-text">
                        1. 상단의 <b>[파일 선택]</b> 버튼으로 CSV를 업로드하세요.<br><br>
                        2. 마우스 휠로 확대/축소하고, 배경을 드래그해 이동할 수 있습니다.<br><br>
                        3. 노드를 마우스로 잡고 끌어당겨 보세요. (옵시디언 방식)<br><br>
                        4. 가장 끝단의 <b>[콘텐츠 노드]</b>를 클릭하면 상세 정보가 나타납니다.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = echarts.init(document.getElementById('mindmap-area'));

        window.addEventListener('resize', function() {
            myChart.resize();
        });

        // 1. CSV 데이터를 네트워크 그래프(Nodes, Links) 구조로 변환
        function buildGraphData(data) {
            let nodes = [];
            let links = [];
            let nodeMap = new Map(); // 중복 노드 방지용

            // 노드 추가 헬퍼 함수
            function addNode(id, name, category, value = null, symbolSize = 20) {
                if (!nodeMap.has(id)) {
                    let node = { 
                        id: id, 
                        name: name, 
                        category: category, 
                        symbolSize: symbolSize 
                    };
                    if (value) node.value = value; // 상세 정보 창을 위한 원본 데이터 저장
                    nodes.push(node);
                    nodeMap.set(id, true);
                }
            }

            // 링크 추가 헬퍼 함수
            function addLink(source, target) {
                links.push({ source: source, target: target });
            }

            // [최상위 루트 노드]
            const rootId = 'root';
            addNode(rootId, '온라인 콘텐츠', 0, null, 50);

            data.forEach((row, index) => {
                if (!row['콘텐츠명'] || row['콘텐츠명'].trim() === '') return;

                const avail = row['공동활용가능여부'] || '분류없음';
                const ai = row['AI교육여부'] || '분류없음';
                const contentName = row['콘텐츠명'];

                // 고유 ID 생성 (O, X가 여러 개 생기지 않도록 경로를 포함)
                const availId = `avail_${avail}`;
                const aiId = `ai_${avail}_${ai}`;
                const contentId = `content_${index}`; // 콘텐츠는 이름이 같아도 개별 노드로 취급하기 위해 인덱스 사용

                // 1단계 노드 (공동활용) 및 연결
                addNode(availId, avail, 1, null, 40);
                addLink(rootId, availId);

                // 2단계 노드 (AI교육) 및 연결
                addNode(aiId, ai, 2, null, 30);
                addLink(availId, aiId);

                // 3단계 노드 (콘텐츠명) 및 연결
                addNode(contentId, contentName, 3, row, 15);
                addLink(aiId, contentId);
            });

            return { nodes, links };
        }

        // 2. ECharts 네트워크 그래프 렌더링 함수
        function renderGraph(graphData) {
            myChart.showLoading();
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}' // 노드 이름만 표시
                },
                // 카테고리별 색상 설정 (옵시디언 스타일 색감)
                color: ['#a371f7', '#4facfe', '#00f2fe', '#f5576c'],
                legend: {
                    data: ['루트', '공동활용', 'AI교육', '콘텐츠'],
                    textStyle: { color: '#e0e0e0' },
                    bottom: 10
                },
                series: [
                    {
                        type: 'graph',
                        layout: 'force', // 물리 엔진(Force-directed) 레이아웃 적용
                        data: graphData.nodes,
                        links: graphData.links,
                        categories: [
                            { name: '루트' },
                            { name: '공동활용' },
                            { name: 'AI교육' },
                            { name: '콘텐츠' }
                        ],
                        roam: true, // 마우스 휠 확대/축소 및 드래그 이동 허용
                        draggable: true, // 노드 드래그 허용
                        label: {
                            show: true,
                            position: 'right',
                            color: '#ccc',
                            fontSize: 11,
                            // 노드 크기가 작은 콘텐츠 노드는 라벨을 숨기거나 줄일 수 있음
                        },
                        force: {
                            repulsion: 300, // 노드 간 밀어내는 힘 (값이 클수록 넓게 퍼짐)
                            edgeLength: [50, 100], // 선의 길이 [최소, 최대]
                            gravity: 0.1 // 중앙으로 모이려는 힘
                        },
                        lineStyle: {
                            color: 'source',
                            curveness: 0.2, // 선을 살짝 휘게 하여 유기적인 느낌 추가
                            opacity: 0.6
                        }
                    }
                ]
            };

            myChart.setOption(option, true);
            myChart.hideLoading();
        }

        // 3. 노드 클릭 이벤트 처리 (상세 정보 표출)
        myChart.on('click', function (params) {
            const nodeData = params.data;

            // value 속성이 있는 경우(콘텐츠 노드)에만 우측 표 업데이트
            if (nodeData && nodeData.value) {
                const detailData = nodeData.value;
                const tableContainer = document.getElementById('table-container');
                const infoBoxTitle = document.querySelector('#infoBox h2');

                infoBoxTitle.textContent = "상세 정보 : " + nodeData.name;

                let tableHTML = '<table><tbody>';
                
                for (const key in detailData) {
                    if (detailData.hasOwnProperty(key)) {
                        const cellValue = detailData[key] ? detailData[key] : '-';
                        tableHTML += `
                            <tr>
                                <th>${key}</th>
                                <td>${cellValue}</td>
                            </tr>
                        `;
                    }
                }
                
                tableHTML += '</tbody></table>';
                tableContainer.innerHTML = tableHTML;
            }
        });

        // 4. 파일 업로드 이벤트 리스너
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.querySelector('#infoBox h2').textContent = "콘텐츠 상세 정보";
            document.getElementById('table-container').innerHTML = '<p class="placeholder-text" style="color:#a371f7; font-weight:bold;">데이터 렌더링 완료! 마우스 휠을 굴려 확대/축소해 보세요.</p>';

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const csvData = results.data;
                    
                    // 네트워크 그래프용 데이터 생성 및 렌더링
                    const graphData = buildGraphData(csvData);
                    renderGraph(graphData);
                },
                error: function(err) {
                    alert("파일을 읽는 중 오류가 발생했습니다.");
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
