<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육혁신처 온라인콘텐츠 시각화 대시보드</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

    <style>
        /* 기본 레이아웃 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f9f9f9;
        }

        /* 상단 헤더 */
        header {
            background-color: #003366; 
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* 메인 콘텐츠 영역 (좌우 분할) */
        .container {
            display: flex;
            flex: 1; 
            overflow: hidden;
        }

        /* 좌측: 마인드맵 차트 영역 (70%) */
        #mindmap-area {
            flex: 7;
            background-color: white;
            border-right: 2px solid #ddd;
            position: relative;
        }

        /* 우측: 상세 정보 테이블 영역 (30%) */
        #detail-area {
            flex: 3;
            padding: 20px;
            background-color: #ffffff;
            overflow-y: auto; 
        }

        .info-box {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            background-color: #f4f7f6;
            min-height: 200px;
        }

        .info-box h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #333;
            border-bottom: 2px solid #003366;
            padding-bottom: 10px;
        }

        /* 동적 생성될 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: left;
        }

        table th {
            background-color: #e9ecef;
            width: 35%;
            color: #333;
            font-weight: bold;
        }
        
        table tr:hover {
            background-color: #f1f1f1;
        }
        
        /* 안내 문구 */
        .placeholder-text {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>온라인콘텐츠 활용 현황 데이터 시각화</h1>
        <div>
            <label for="csvFileInput" style="margin-right: 10px; font-weight: bold;">CSV 데이터 파일 업로드:</label>
            <input type="file" id="csvFileInput" accept=".csv" />
        </div>
    </header>

    <div class="container">
        <div id="mindmap-area"></div>
        
        <div id="detail-area">
            <div class="info-box" id="infoBox">
                <h2>콘텐츠 상세 정보</h2>
                <div id="table-container">
                    <p class="placeholder-text">
                        1. 상단의 <b>[파일 선택]</b> 버튼을 눌러 CSV 데이터를 업로드해주세요.<br><br>
                        2. 좌측에 생성된 마인드맵 구조를 클릭하여 펼쳐보세요.<br><br>
                        3. 끝단의 <b>[콘텐츠명]</b>을 클릭하면 이곳에 세부 정보가 표시됩니다.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ECharts 차트 인스턴스 초기화
        let myChart = echarts.init(document.getElementById('mindmap-area'));

        // 윈도우 크기 변경 시 차트 크기 반응형 조절
        window.addEventListener('resize', function() {
            myChart.resize();
        });

        // 1. CSV 데이터를 트리 구조(JSON)로 변환하는 함수
        function buildTreeData(data) {
            const root = { name: "온라인 콘텐츠", children: [] };

            data.forEach(row => {
                // 콘텐츠명이 없거나 빈 행은 건너뜀
                if (!row['콘텐츠명'] || row['콘텐츠명'].trim() === '') return;

                const avail = row['공동활용가능여부'] || '분류없음';
                const ai = row['AI교육여부'] || '분류없음';
                const contentName = row['콘텐츠명'];

                // 1단계 노드 (공동활용가능여부) 찾기 또는 생성
                let availNode = root.children.find(n => n.name === avail);
                if (!availNode) {
                    availNode = { name: avail, children: [] };
                    root.children.push(availNode);
                }

                // 2단계 노드 (AI교육여부) 찾기 또는 생성
                let aiNode = availNode.children.find(n => n.name === ai);
                if (!aiNode) {
                    aiNode = { name: ai, children: [] };
                    availNode.children.push(aiNode);
                }

                // 3단계 노드 (콘텐츠명) 및 세부 데이터 저장
                aiNode.children.push({
                    name: contentName,
                    value: row // 클릭 시 표출할 전체 행(Row) 데이터를 통째로 저장
                });
            });

            return root;
        }

        // 2. ECharts 마인드맵 렌더링 함수
        function renderMindmap(treeData) {
            myChart.showLoading();
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    triggerOn: 'mousemove',
                    formatter: function (info) {
                        return info.name;
                    }
                },
                series: [
                    {
                        type: 'tree',
                        data: [treeData],
                        top: '5%',
                        left: '10%',
                        bottom: '5%',
                        right: '35%', // 라벨이 긴 콘텐츠명을 위해 오른쪽 여백을 넉넉히 줌
                        symbolSize: 12,
                        orient: 'LR', // Left to Right
                        expandAndCollapse: true,
                        initialTreeDepth: 2, // 초기 화면에서 보여줄 뎁스
                        label: {
                            position: 'left',
                            verticalAlign: 'middle',
                            align: 'right',
                            fontSize: 14,
                            color: '#333'
                        },
                        leaves: {
                            label: {
                                position: 'right',
                                verticalAlign: 'middle',
                                align: 'left',
                                color: '#0055a5', // 끝단 콘텐츠명 색상 강조
                                fontWeight: 'bold'
                            }
                        },
                        animationDurationUpdate: 750
                    }
                ]
            };

            myChart.setOption(option, true); // true 옵션을 주어 이전 데이터를 완전히 덮어씀
            myChart.hideLoading();
        }

        // 3. 노드 클릭 이벤트 처리 (상세 정보 표출)
        myChart.on('click', function (params) {
            const nodeData = params.data;

            // value 속성이 있는 경우(끝단 콘텐츠명)에만 우측 표 업데이트
            if (nodeData && nodeData.value) {
                const detailData = nodeData.value;
                const tableContainer = document.getElementById('table-container');
                const infoBoxTitle = document.querySelector('#infoBox h2');

                // 우측 패널 제목 변경
                infoBoxTitle.textContent = "상세 정보 : " + nodeData.name;

                // 테이블 HTML 동적 생성
                let tableHTML = '<table><tbody>';
                
                for (const key in detailData) {
                    if (detailData.hasOwnProperty(key)) {
                        // 값이 비어있으면 '-'로 표시
                        const cellValue = detailData[key] ? detailData[key] : '-';
                        tableHTML += `
                            <tr>
                                <th>${key}</th>
                                <td>${cellValue}</td>
                            </tr>
                        `;
                    }
                }
                
                tableHTML += '</tbody></table>';

                // 생성된 테이블 삽입
                tableContainer.innerHTML = tableHTML;
            }
        });

        // 4. 파일 업로드 이벤트 리스너
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 새 파일을 올렸을 때 우측 상세 정보창 초기화
            document.querySelector('#infoBox h2').textContent = "콘텐츠 상세 정보";
            document.getElementById('table-container').innerHTML = '<p class="placeholder-text" style="color:#0055a5; font-weight:bold;">데이터 로드 완료! 좌측 마인드맵에서 콘텐츠를 클릭해보세요.</p>';

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true, // 빈 줄 무시
                complete: function(results) {
                    const csvData = results.data;
                    
                    // 데이터 가공 및 차트 렌더링
                    const treeData = buildTreeData(csvData);
                    renderMindmap(treeData);
                },
                error: function(err) {
                    alert("파일을 읽는 중 오류가 발생했습니다.");
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
