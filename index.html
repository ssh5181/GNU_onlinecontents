<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육혁신처 온라인콘텐츠 마인드맵</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

    <style>
        /* 전체 화면 꽉 차게 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f9f9f9;
        }

        /* 상단 헤더 및 파일 업로드 영역 */
        header {
            background-color: #003366; /* 대학/기관 느낌의 차분한 남색 */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* 메인 콘텐츠 영역 (좌우 분할) */
        .container {
            display: flex;
            flex: 1; /* 남은 화면 높이를 모두 차지 */
            overflow: hidden;
        }

        /* 좌측: 마인드맵 차트 영역 (70%) */
        #mindmap-area {
            flex: 7;
            background-color: white;
            border-right: 2px solid #ddd;
            position: relative;
        }

        /* 우측: 상세 정보 테이블 영역 (30%) */
        #detail-area {
            flex: 3;
            padding: 20px;
            background-color: #ffffff;
            overflow-y: auto; /* 내용이 길면 스크롤 생성 */
        }

        .info-box {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            background-color: #f4f7f6;
        }

        .info-box h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #333;
            border-bottom: 2px solid #003366;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        table th {
            background-color: #e9ecef;
            width: 35%;
        }
    </style>
</head>
<body>

    <header>
        <h1>온라인콘텐츠 활용 현황 시각화</h1>
        <div>
            <label for="csvFileInput" style="margin-right: 10px;">데이터 파일(CSV) 선택:</label>
            <input type="file" id="csvFileInput" accept=".csv" />
        </div>
    </header>

    <div class="container">
        <div id="mindmap-area"></div>
        
        <div id="detail-area">
            <div class="info-box" id="infoBox">
                <h2>콘텐츠 상세 정보</h2>
                <p style="color: #666;">마인드맵에서 콘텐츠명을 클릭하면 이곳에 세부 정보가 나타납니다.</p>
                <div id="table-container"></div>
            </div>
        </div>
    </div>

    <script>
        // ECharts 차트 인스턴스 초기화 (전역 변수)
        let myChart = echarts.init(document.getElementById('mindmap-area'));

        // 윈도우 크기 변경 시 차트 크기도 반응형으로 조절
        window.addEventListener('resize', function() {
            myChart.resize();
        });

        // 파일 업로드 이벤트 리스너
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // PapaParse를 이용해 CSV 파일 읽기
            Papa.parse(file, {
                header: true, // 첫 줄을 열 이름(Key)으로 사용
                skipEmptyLines: true, // 빈 줄 무시
                complete: function(results) {
                    const csvData = results.data;
                    console.log("CSV 데이터 로드 완료:", csvData);
                    
                    // TODO: Step 2에서 여기서 데이터를 계층형(Tree)으로 가공하는 함수를 호출할 예정입니다.
                    alert("데이터 로드 성공! 총 " + csvData.length + "개의 데이터를 불러왔습니다. F12를 눌러 콘솔창을 확인해보세요.");
                },
                error: function(err) {
                    alert("파일을 읽는 중 오류가 발생했습니다.");
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
