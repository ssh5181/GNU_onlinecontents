<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육혁신처 온라인콘텐츠 마인드맵</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

    <style>
        /* 전체 화면 꽉 차게 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f9f9f9;
        }

        /* 상단 헤더 및 파일 업로드 영역 */
        header {
            background-color: #003366; /* 대학/기관 느낌의 차분한 남색 */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* 메인 콘텐츠 영역 (좌우 분할) */
        .container {
            display: flex;
            flex: 1; /* 남은 화면 높이를 모두 차지 */
            overflow: hidden;
        }

        /* 좌측: 마인드맵 차트 영역 (70%) */
        #mindmap-area {
            flex: 7;
            background-color: white;
            border-right: 2px solid #ddd;
            position: relative;
        }

        /* 우측: 상세 정보 테이블 영역 (30%) */
        #detail-area {
            flex: 3;
            padding: 20px;
            background-color: #ffffff;
            overflow-y: auto; /* 내용이 길면 스크롤 생성 */
        }

        .info-box {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            background-color: #f4f7f6;
        }

        .info-box h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #333;
            border-bottom: 2px solid #003366;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        table th {
            background-color: #e9ecef;
            width: 35%;
        }
    </style>
</head>
<body>

    <header>
        <h1>온라인콘텐츠 활용 현황 시각화</h1>
        <div>
            <label for="csvFileInput" style="margin-right: 10px;">데이터 파일(CSV) 선택:</label>
            <input type="file" id="csvFileInput" accept=".csv" />
        </div>
    </header>

    <div class="container">
        <div id="mindmap-area"></div>
        
        <div id="detail-area">
            <div class="info-box" id="infoBox">
                <h2>콘텐츠 상세 정보</h2>
                <p style="color: #666;">마인드맵에서 콘텐츠명을 클릭하면 이곳에 세부 정보가 나타납니다.</p>
                <div id="table-container"></div>
            </div>
        </div>
    </div>

<script>
        // ECharts 차트 인스턴스 초기화
        let myChart = echarts.init(document.getElementById('mindmap-area'));

        // 윈도우 크기 변경 시 차트 크기 반응형 조절
        window.addEventListener('resize', function() {
            myChart.resize();
        });

        // 1. CSV 데이터를 트리 구조(JSON)로 변환하는 함수
        function buildTreeData(data) {
            const root = { name: "온라인 콘텐츠", children: [] };

            data.forEach(row => {
                if (!row['콘텐츠명']) return;

                const avail = row['공동활용가능여부'] || '분류없음';
                const ai = row['AI교육여부'] || '분류없음';
                const contentName = row['콘텐츠명'];

                // 1단계 노드 (공동활용가능여부)
                let availNode = root.children.find(n => n.name === avail);
                if (!availNode) {
                    availNode = { name: avail, children: [] };
                    root.children.push(availNode);
                }

                // 2단계 노드 (AI교육여부)
                let aiNode = availNode.children.find(n => n.name === ai);
                if (!aiNode) {
                    aiNode = { name: ai, children: [] };
                    availNode.children.push(aiNode);
                }

                // 3단계 노드 (콘텐츠명) 및 세부 데이터 저장
                aiNode.children.push({
                    name: contentName,
                    value: row // 클릭 시 표출할 전체 데이터 보관
                });
            });

            return root;
        }

        // 2. ECharts 마인드맵 렌더링 함수
        function renderMindmap(treeData) {
            myChart.showLoading();
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    triggerOn: 'mousemove',
                    formatter: function (info) {
                        return info.name;
                    }
                },
                series: [
                    {
                        type: 'tree',
                        data: [treeData],
                        top: '5%',
                        left: '10%',
                        bottom: '5%',
                        right: '30%', 
                        symbolSize: 10,
                        orient: 'LR',
                        expandAndCollapse: true,
                        initialTreeDepth: 2, 
                        label: {
                            position: 'left',
                            verticalAlign: 'middle',
                            align: 'right',
                            fontSize: 13,
                            color: '#333'
                        },
                        leaves: {
                            label: {
                                position: 'right',
                                verticalAlign: 'middle',
                                align: 'left',
                                color: '#003366',
                                fontWeight: 'bold'
                            }
                        },
                        animationDurationUpdate: 750
                    }
                ]
            };

            myChart.setOption(option);
            myChart.hideLoading();
        }

        // 3. (Step 4 핵심) 노드 클릭 이벤트 처리 
        myChart.on('click', function (params) {
            const nodeData = params.data;

            // value 속성이 있는 경우(즉, 끝단 콘텐츠명 노드를 클릭한 경우)에만 우측 표 업데이트
            if (nodeData && nodeData.value) {
                const detailData = nodeData.value;
                const tableContainer = document.getElementById('table-container');
                const infoBoxTitle = document.querySelector('#infoBox h2');

                // 우측 패널 제목을 클릭한 콘텐츠명으로 변경
                infoBoxTitle.textContent = "상세 정보 : " + nodeData.name;

                // 테이블 HTML 동적 생성
                let tableHTML = '<table><tbody>';
                
                // 데이터 객체의 key, value를 순회하며 행(tr) 생성
                for (const key in detailData) {
                    // 빈 데이터나 불필요한 속성은 건너뛸 수 있도록 조건 추가 가능
                    if (detailData.hasOwnProperty(key)) {
                        tableHTML += `
                            <tr>
                                <th>${key}</th>
                                <td>${detailData[key] ? detailData[key] : '-'}</td>
                            </tr>
                        `;
                    }
                }
                
                tableHTML += '</tbody></table>';

                // 완성된 테이블을 우측 패널에 삽입
                tableContainer.innerHTML = tableHTML;
            }
        });

        // 4. 파일 업로드 이벤트 리스너
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const csvData = results.data;
                    const treeData = buildTreeData(csvData);
                    renderMindmap(treeData);
                },
                error: function(err) {
                    alert("파일을 읽는 중 오류가 발생했습니다.");
                    console.error(err);
                }
            });
        });

    </script>
</body>
</html>
